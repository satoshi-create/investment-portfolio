# 米国株クローズ後〜翌朝向け: 日本時間 08:00 付近（UTC 23:00）
# Secrets: SNAPSHOT_BASE_URL（例 https://your-app.vercel.app）, BACKFILL_API_KEY（本番と同一）
# 任意: SNAPSHOT_USER_ID（未設定時は defaultProfileUserId）

name: Daily portfolio snapshot

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/backfill
        env:
          SNAPSHOT_BASE_URL: ${{ secrets.SNAPSHOT_BASE_URL }}
          BACKFILL_API_KEY: ${{ secrets.BACKFILL_API_KEY }}
          SNAPSHOT_USER_ID: ${{ secrets.SNAPSHOT_USER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${SNAPSHOT_BASE_URL:-}" ] || [ -z "${BACKFILL_API_KEY:-}" ]; then
            echo "Set GitHub secrets: SNAPSHOT_BASE_URL, BACKFILL_API_KEY"
            exit 1
          fi
          BASE="${SNAPSHOT_BASE_URL%/}"
          Q=""
          if [ -n "${SNAPSHOT_USER_ID:-}" ]; then
            Q="?userId=${SNAPSHOT_USER_ID}"
          fi
          curl -fsS -X POST "${BASE}/api/backfill${Q}" \
            -H "Authorization: Bearer ${BACKFILL_API_KEY}" \
            -H "Accept: application/json"
